<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>⛳ 라운딩 후 저녁 메뉴 투표</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #1a6b3c 0%, #2d9e5f 40%, #1a4a2e 100%);
      padding: 30px 20px 60px;
    }

    .container { max-width: 820px; margin: 0 auto; }

    /* ── 헤더 ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header .golf-icon {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 10px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .header h1 {
      font-size: 1.9rem;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.35);
      margin-bottom: 8px;
      line-height: 1.3;
    }

    .header .sub {
      color: rgba(255,255,255,0.78);
      font-size: 0.95rem;
    }

    /* ── 카드 ── */
    .card {
      background: #fff;
      border-radius: 22px;
      padding: 28px 30px;
      margin-bottom: 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: #1a6b3c;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e8f5ee;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .step-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #1a6b3c, #2d9e5f);
      color: #fff;
      border-radius: 50%;
      font-size: 0.78rem;
      font-weight: 800;
      flex-shrink: 0;
    }

    /* ── 투표자 그리드 ── */
    .voter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .voter-btn {
      padding: 16px 8px;
      border: 2px solid #d8edd8;
      border-radius: 14px;
      background: #fff;
      cursor: pointer;
      font-size: 0.97rem;
      font-weight: 700;
      color: #444;
      transition: all 0.18s;
      text-align: center;
      position: relative;
    }

    .voter-btn:hover:not(:disabled) {
      border-color: #2d9e5f;
      color: #1a6b3c;
      background: #f0faf4;
      transform: translateY(-2px);
    }

    .voter-btn.selected {
      border-color: #1a6b3c;
      background: linear-gradient(135deg, #1a6b3c, #2d9e5f);
      color: #fff;
      box-shadow: 0 4px 14px rgba(26,107,60,0.4);
      transform: translateY(-2px);
    }

    .voter-btn.voted {
      border-color: #c8e6c9;
      background: #f1f8f2;
      color: #aaa;
      cursor: not-allowed;
    }

    .voter-btn.voted::after {
      content: '✓ 완료';
      display: block;
      font-size: 0.68rem;
      color: #4caf50;
      font-weight: 700;
      margin-top: 3px;
    }

    /* ── 메뉴 그리드 ── */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .menu-btn {
      padding: 22px 10px 16px;
      border: 2px solid #d8edd8;
      border-radius: 16px;
      background: #fff;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .menu-btn .m-emoji {
      display: block;
      font-size: 2.4rem;
      margin-bottom: 8px;
    }

    .menu-btn .m-name {
      font-size: 0.97rem;
      font-weight: 700;
      color: #444;
    }

    .menu-btn:hover {
      border-color: #2d9e5f;
      background: #f0faf4;
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(45,158,95,0.18);
    }

    .menu-btn.selected {
      border-color: #1a6b3c;
      background: linear-gradient(135deg, #1a6b3c, #2d9e5f);
      transform: translateY(-4px);
      box-shadow: 0 8px 22px rgba(26,107,60,0.38);
    }

    .menu-btn.selected .m-name { color: #fff; }

    /* ── 기타 메모 ── */
    .memo-wrap {
      margin-top: 18px;
      display: none;
      animation: fadeSlide 0.22s ease;
    }

    .memo-wrap.show { display: block; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .memo-wrap label {
      display: block;
      font-size: 0.88rem;
      font-weight: 600;
      color: #1a6b3c;
      margin-bottom: 8px;
    }

    .memo-wrap textarea {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #d8edd8;
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      color: #333;
      transition: border-color 0.18s;
    }

    .memo-wrap textarea:focus {
      outline: none;
      border-color: #2d9e5f;
      box-shadow: 0 0 0 3px rgba(45,158,95,0.12);
    }

    /* ── 알림 ── */
    .alert {
      border-radius: 12px;
      padding: 13px 16px;
      font-size: 0.93rem;
      font-weight: 600;
      margin-bottom: 14px;
      display: none;
    }

    .alert.success {
      display: block;
      background: #d4edda;
      color: #155724;
      border: 1px solid #b8dfc4;
    }

    .alert.error {
      display: block;
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f1b0b7;
    }

    /* ── 제출 버튼 ── */
    .submit-btn {
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #1a6b3c, #2d9e5f);
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 1.1rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(26,107,60,0.35);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(26,107,60,0.45);
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── 결과 헤더 ── */
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e8f5ee;
    }

    .result-header .card-title {
      margin: 0;
      padding: 0;
      border: none;
    }

    .refresh-btn {
      padding: 7px 14px;
      background: #e8f5ee;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 700;
      color: #1a6b3c;
      transition: all 0.18s;
    }

    .refresh-btn:hover { background: #d4edda; }

    /* ── 집계 ── */
    .tally-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .tally-card {
      text-align: center;
      padding: 16px 10px;
      border-radius: 16px;
      background: #f8fdf9;
      border: 2px solid #e0f0e4;
      transition: all 0.2s;
    }

    .tally-card.winner {
      border-color: #1a6b3c;
      background: linear-gradient(135deg, #edfaf2, #f0fdf5);
      box-shadow: 0 4px 16px rgba(26,107,60,0.18);
    }

    .tally-card .t-emoji  { font-size: 2rem; display: block; margin-bottom: 4px; }
    .tally-card .t-name   { font-size: 0.88rem; font-weight: 700; color: #2d5a3d; }
    .tally-card .t-count  { font-size: 2.1rem; font-weight: 800; color: #1a6b3c; line-height: 1.2; margin-top: 4px; }
    .tally-card .t-unit   { font-size: 0.78rem; color: #aaa; }

    .progress-wrap {
      background: #dceee0;
      border-radius: 8px;
      height: 7px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, #1a6b3c, #2d9e5f);
      transition: width 0.6s ease;
    }

    /* ── 투표 목록 ── */
    .vote-list { display: flex; flex-direction: column; gap: 8px; }

    .vote-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      background: #f8fdf9;
      border: 1px solid #e0f0e4;
      border-radius: 12px;
      transition: background 0.15s;
    }

    .vote-item:hover { background: #edfaf2; }

    .v-name {
      font-weight: 700;
      color: #1a6b3c;
      min-width: 64px;
      font-size: 0.93rem;
    }

    .v-tag {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .tag-치킨     { background: #fff3cd; color: #856404; }
    .tag-돼지고기  { background: #fce4ec; color: #880e4f; }
    .tag-회       { background: #e3f2fd; color: #0d47a1; }
    .tag-기타     { background: #e8f5e9; color: #1b5e20; }

    .v-memo {
      font-size: 0.84rem;
      color: #777;
      font-style: italic;
      flex: 1;
    }

    .v-time {
      font-size: 0.76rem;
      color: #bbb;
      white-space: nowrap;
      margin-left: auto;
    }

    .no-data {
      text-align: center;
      color: #aaa;
      padding: 28px;
      font-size: 0.93rem;
    }

    /* ── 반응형 ── */
    @media (max-width: 580px) {
      .header h1    { font-size: 1.45rem; }
      .voter-grid   { grid-template-columns: repeat(2, 1fr); }
      .menu-grid    { grid-template-columns: repeat(2, 1fr); }
      .tally-grid   { grid-template-columns: repeat(2, 1fr); }
      .card         { padding: 20px 16px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <span class="golf-icon">⛳</span>
    <h1>내일 즐거운 라운딩 후<br>저녁 메뉴 투표</h1>
    <p class="sub">🏌️ 라운딩만큼 중요한 저녁 메뉴! 한 명당 한 번만 투표 가능합니다.</p>
  </div>

  <!-- STEP 1 : 투표자 선택 -->
  <div class="card">
    <div class="card-title">
      <span class="step-badge">1</span>
      투표자를 선택하세요
    </div>
    <div class="voter-grid" id="voterGrid"></div>
  </div>

  <!-- STEP 2 : 메뉴 선택 -->
  <div class="card">
    <div class="card-title">
      <span class="step-badge">2</span>
      원하는 저녁 메뉴를 선택하세요
    </div>
    <div class="menu-grid" id="menuGrid"></div>

    <div class="memo-wrap" id="memoWrap">
      <label>📝 어떤 메뉴를 원하시나요?</label>
      <textarea id="memoInput" placeholder="원하는 메뉴를 자유롭게 입력해주세요..."></textarea>
    </div>
  </div>

  <!-- 제출 -->
  <div class="card">
    <div id="alertBox" class="alert"></div>
    <button class="submit-btn" id="submitBtn" onclick="submitVote()">
      🗳️ 투표하기
    </button>
  </div>

  <!-- 결과 -->
  <div class="card">
    <div class="result-header">
      <div class="card-title">
        📊 실시간 투표 현황
      </div>
      <button class="refresh-btn" onclick="loadResults()">🔄 새로고침</button>
    </div>
    <div class="tally-grid" id="tallyGrid"></div>
    <div class="vote-list"  id="voteList">
      <div class="no-data">아직 투표가 없습니다.</div>
    </div>
  </div>

</div><!-- /container -->

<script>
  /* ================================================
     Supabase 초기화
  ================================================ */
  const SUPABASE_URL      = 'https://jayopccqsgszybpnxvnx.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpheW9wY2Nxc2dzenlicG54dm54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNDg0OTcsImV4cCI6MjA5NTkyNDQ5N30.QvbXm_BVPlkC_xUvX1PzLL063CAgtyv9qcbFxAXjJdQ';

  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  /* ================================================
     정적 데이터
  ================================================ */
  const VOTERS = ['양유신', '변성주', '김태우', '김수한'];

  const MENUS = [
    { name: '치킨',    emoji: '🍗' },
    { name: '돼지고기', emoji: '🥩' },
    { name: '회',      emoji: '🐟' },
    { name: '기타',    emoji: '✏️'  },
  ];

  /* ================================================
     상태
  ================================================ */
  let selectedVoter = null;
  let selectedMenu  = null;
  let votedSet      = new Set();

  /* ================================================
     초기화
  ================================================ */
  async function init() {
    await loadResults();   // DB에서 기투표자 먼저 파악
    renderVoters();
    renderMenus();
  }

  /* ================================================
     투표자 렌더링
  ================================================ */
  function renderVoters() {
    const grid = document.getElementById('voterGrid');
    grid.innerHTML = '';

    VOTERS.forEach(name => {
      const isVoted = votedSet.has(name);
      const btn = document.createElement('button');
      btn.className = 'voter-btn' + (isVoted ? ' voted' : '');
      btn.textContent = name;
      btn.disabled = isVoted;
      btn.onclick = () => selectVoter(name, btn);
      grid.appendChild(btn);
    });
  }

  function selectVoter(name, btn) {
    if (votedSet.has(name)) return;
    selectedVoter = name;
    document.querySelectorAll('.voter-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  /* ================================================
     메뉴 렌더링
  ================================================ */
  function renderMenus() {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';

    MENUS.forEach(menu => {
      const btn = document.createElement('button');
      btn.className = 'menu-btn';
      btn.innerHTML = `
        <span class="m-emoji">${menu.emoji}</span>
        <span class="m-name">${menu.name}</span>
      `;
      btn.onclick = () => selectMenu(menu.name, btn);
      grid.appendChild(btn);
    });
  }

  function selectMenu(name, btn) {
    selectedMenu = name;
    document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    const memoWrap = document.getElementById('memoWrap');
    if (name === '기타') {
      memoWrap.classList.add('show');
    } else {
      memoWrap.classList.remove('show');
      document.getElementById('memoInput').value = '';
    }
  }

  /* ================================================
     투표 제출
  ================================================ */
  async function submitVote() {
    clearAlert();

    if (!selectedVoter) {
      showAlert('error', '⚠️ 투표자를 먼저 선택해주세요!');
      return;
    }
    if (!selectedMenu) {
      showAlert('error', '⚠️ 메뉴를 선택해주세요!');
      return;
    }

    const memo = document.getElementById('memoInput').value.trim();
    if (selectedMenu === '기타' && !memo) {
      showAlert('error', '⚠️ 기타 메뉴 내용을 입력해주세요!');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ 저장 중...';

    try {
      const { error } = await db.from('golf_votes').insert([{
        voter_name : selectedVoter,
        menu       : selectedMenu,
        memo       : selectedMenu === '기타' ? memo : null,
      }]);

      if (error) throw error;

      // 성공
      votedSet.add(selectedVoter);
      showAlert('success',
        `✅ ${selectedVoter}님의 투표 완료! (${selectedMenu}${memo ? ' · ' + memo : ''})`
      );

      // 상태 초기화
      selectedVoter = null;
      selectedMenu  = null;
      document.getElementById('memoInput').value = '';
      document.getElementById('memoWrap').classList.remove('show');
      document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('selected'));
      renderVoters();

      await loadResults();

    } catch (err) {
      console.error(err);
      showAlert('error', `❌ 저장 중 오류가 발생했습니다: ${err.message}`);
    } finally {
      btn.disabled = false;
      btn.textContent = '🗳️ 투표하기';
    }
  }

  /* ================================================
     결과 불러오기
  ================================================ */
  async function loadResults() {
    try {
      const { data, error } = await db
        .from('golf_votes')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) throw error;

      votedSet = new Set(data.map(v => v.voter_name));
      renderVoters();
      renderTally(data);
      renderVoteList(data);

    } catch (err) {
      console.error('결과 로드 오류:', err);
    }
  }

  /* ================================================
     집계 렌더링
  ================================================ */
  function renderTally(data) {
    const grid   = document.getElementById('tallyGrid');
    const counts = {};
    MENUS.forEach(m => { counts[m.name] = 0; });
    data.forEach(v => { if (counts[v.menu] !== undefined) counts[v.menu]++; });

    const maxCount = Math.max(...Object.values(counts), 0);
    const total    = data.length;

    grid.innerHTML = '';
    MENUS.forEach(menu => {
      const cnt      = counts[menu.name];
      const isWinner = cnt > 0 && cnt === maxCount;
      const pct      = total > 0 ? Math.round(cnt / total * 100) : 0;

      const div = document.createElement('div');
      div.className = 'tally-card' + (isWinner ? ' winner' : '');
      div.innerHTML = `
        <span class="t-emoji">${menu.emoji}</span>
        <div class="t-name">${menu.name}${isWinner ? ' 👑' : ''}</div>
        <div class="t-count">${cnt}</div>
        <div class="t-unit">표 (${pct}%)</div>
        <div class="progress-wrap">
          <div class="progress-bar" style="width:${pct}%"></div>
        </div>
      `;
      grid.appendChild(div);
    });
  }

  /* ================================================
     투표 목록 렌더링
  ================================================ */
  function renderVoteList(data) {
    const list = document.getElementById('voteList');

    if (data.length === 0) {
      list.innerHTML = '<div class="no-data">⛳ 아직 투표가 없습니다. 첫 번째로 투표해보세요!</div>';
      return;
    }

    list.innerHTML = data.map(v => {
      const time  = new Date(v.created_at).toLocaleTimeString('ko-KR', {
        hour: '2-digit', minute: '2-digit'
      });
      const emoji = MENUS.find(m => m.name === v.menu)?.emoji ?? '';
      return `
        <div class="vote-item">
          <span class="v-name">${v.voter_name}</span>
          <span class="v-tag tag-${v.menu}">${emoji} ${v.menu}</span>
          ${v.memo
            ? `<span class="v-memo">"${v.memo}"</span>`
            : '<span class="v-memo"></span>'
          }
          <span class="v-time">${time}</span>
        </div>
      `;
    }).join('');
  }

  /* ================================================
     알림 헬퍼
  ================================================ */
  let alertTimer = null;

  function showAlert(type, msg) {
    const box = document.getElementById('alertBox');
    box.className = `alert ${type}`;
    box.textContent = msg;
    if (alertTimer) clearTimeout(alertTimer);
    alertTimer = setTimeout(clearAlert, 5000);
  }

  function clearAlert() {
    const box = document.getElementById('alertBox');
    box.className = 'alert';
    box.textContent = '';
  }

  /* ── 실행 ── */
  init();
</script>
</body>
</html>
